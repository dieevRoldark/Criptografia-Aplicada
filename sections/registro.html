<section class="wrapper" aria-labelledby="registro-title">
    <div class="main__wrapper main__wrapper--register">
        <header class="login__wrapper">
            <a href="#login" aria-label="Market D&D">
                <svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                    <path d="M12 22l4 -4l-2.5 -11l.993 -2.649a1 1 0 0 0 -.936 -1.351h-3.114a1 1 0 0 0 -.936 1.351l.993 2.649l-2.5 11l4 4" />
                    <path d="M10.5 7h3l5 5.5" />
                </svg>
            </a>
            <h1 id="registro-title">Registro</h1>
            <p>Crea tu cuenta</p>
        </header>

        <form id="register-form" class="login__form" novalidate>
            <label for="register-name">Nombre:
                <input type="text" id="register-name" name="name" placeholder="Ingresa tu nombre" autocomplete="name" required>
            </label>

            <label for="register-email">Email:
                <input type="email" id="register-email" name="email" placeholder="Ingresa tu email" autocomplete="email" required>
            </label>

            <label for="register-password">Password:
                <input type="password" id="register-password" name="password" placeholder="Crea una contrasena" autocomplete="new-password" required>
            </label>

            <label for="register-confirm">Confirmar password:
                <input type="password" id="register-confirm" name="confirm-password" placeholder="Repite tu contrasena" autocomplete="new-password" required>
            </label>

            <p id="register-error" class="login__error" hidden></p>

            <button type="submit" class="btn btn--primary">Crear cuenta</button>
        </form>

        <footer class="login__footer">
            <p>Ya tienes una cuenta? <a href="#login">Inicia sesion</a></p>
        </footer>
    </div>
</section>
