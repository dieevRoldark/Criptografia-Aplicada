<section class="wrapper" aria-labelledby="login-title">
    <div class="main__wrapper">
        <header class="login__wrapper">
            <a href="#login" aria-label="Market D&D">
                <svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                    <path d="M12 22l4 -4l-2.5 -11l.993 -2.649a1 1 0 0 0 -.936 -1.351h-3.114a1 1 0 0 0 -.936 1.351l.993 2.649l-2.5 11l4 4" />
                    <path d="M10.5 7h3l5 5.5" />
                </svg>
            </a>
            <h1 id="login-title">Inicia sesion</h1>
            <p>Ingresa a tu cuenta para continuar</p>
        </header>

        <form id="login-form" class="login__form" novalidate>
            <label for="email">Correo:
                <input type="email" id="email" name="email" placeholder="Ingresa tu correo" autocomplete="email" required>
            </label>

            <label for="password">Contrasena:
                <input type="password" id="password" name="password" placeholder="Ingresa tu contrasena" autocomplete="current-password" required>
            </label>

            <p id="login-error" class="login__error" hidden></p>

            <div class="check__remed">
                <label for="checkbox">
                    <input type="checkbox" id="checkbox" name="remember">
                    Recordarme
                </label>

                <a href="#login">Olvidaste tu contrasena?</a>
            </div>

            <button type="submit" class="btn btn--primary">Iniciar sesion</button>
        </form>

        <footer class="login__footer">
            <p>No tienes una cuenta? <a id="go-register" href="#registro">Registrate</a></p>
        </footer>
    </div>
</section>
